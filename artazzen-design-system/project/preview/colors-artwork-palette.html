<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@500,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Clash Grotesk', sans-serif; background: #F9F7F2; padding: 18px 20px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .swatch { border-radius: 2px; overflow: hidden; }
  .color { height: 56px; }
  .info { background: #fff; padding: 5px 7px; border: 1px solid #DDD8CB; border-top: none; }
  .name { font-size: 9px; font-weight: 600; color: #121212; letter-spacing: .04em; text-transform: uppercase; }
  .hex  { font-size: 9px; color: #78736C; font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
  .section { font-size: 8px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: #9E9890; margin-bottom: 7px; }
</style>
</head>
<body>
<div class="section">Artwork Palette — Techno-Botanical</div>
<div class="grid">
  <div class="swatch"><div class="color" style="background:#121212"></div><div class="info"><div class="name">Carbon</div><div class="hex">#121212</div></div></div>
  <div class="swatch"><div class="color" style="background:#F9F7F2; border:1px solid #DDD8CB;"></div><div class="info"><div class="name">Parchment</div><div class="hex">#F9F7F2</div></div></div>
  <div class="swatch"><div class="color" style="background:#E8820A"></div><div class="info"><div class="name">Orange</div><div class="hex">#E8820A</div></div></div>
  <div class="swatch"><div class="color" style="background:#6E3FD6"></div><div class="info"><div class="name">Violet</div><div class="hex">#6E3FD6</div></div></div>
  <div class="swatch"><div class="color" style="background:#1A9490"></div><div class="info"><div class="name">Teal</div><div class="hex">#1A9490</div></div></div>
  <div class="swatch"><div class="color" style="background:#C7231B"></div><div class="info"><div class="name">Crimson</div><div class="hex">#C7231B</div></div></div>
  <div class="swatch"><div class="color" style="background:#F2B824"></div><div class="info"><div class="name">Gold</div><div class="hex">#F2B824</div></div></div>
  <div class="swatch"><div class="color" style="background:#D8527D"></div><div class="info"><div class="name">Rose</div><div class="hex">#D8527D</div></div></div>
  <div class="swatch"><div class="color" style="background:#5BA3C9"></div><div class="info"><div class="name">Sky</div><div class="hex">#5BA3C9</div></div></div>
  <div class="swatch"><div class="color" style="background:#4A7C59"></div><div class="info"><div class="name">Sage</div><div class="hex">#4A7C59</div></div></div>
  <div class="swatch"><div class="color" style="background:#5C3A1E"></div><div class="info"><div class="name">Earth</div><div class="hex">#5C3A1E</div></div></div>
  <div class="swatch"><div class="color" style="background:#9EEA2F"></div><div class="info"><div class="name">Chartreuse</div><div class="hex">#9EEA2F</div></div></div>
  <div class="swatch"><div class="color" style="background:#0A1633"></div><div class="info"><div class="name">Navy</div><div class="hex">#0A1633</div></div></div>
  <div class="swatch"><div class="color" style="background:#13D672"></div><div class="info"><div class="name">Mint</div><div class="hex">#13D672</div></div></div>
  <div class="swatch"><div class="color" style="background:#F09B2E"></div><div class="info"><div class="name">Tangerine</div><div class="hex">#F09B2E</div></div></div>
  <div class="swatch"><div class="color" style="background:#FFD000"></div><div class="info"><div class="name">Lemon</div><div class="hex">#FFD000</div></div></div>
</div>
</body>
</html>
