<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0E0C0C; padding: 0; overflow: hidden; }
  .mosaic { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 130px); gap: 3px; }
  .tile { overflow: hidden; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tile.wide { grid-column: span 2; }
</style>
</head>
<body>
<div class="mosaic">
  <div class="tile wide"><img src="../assets/artwork-1.jpeg" alt=""></div>
  <div class="tile"><img src="../assets/artwork-6.jpeg" alt=""></div>
  <div class="tile"><img src="../assets/artwork-2.jpeg" alt=""></div>
  <div class="tile"><img src="../assets/artwork-4.jpeg" alt=""></div>
  <div class="tile"><img src="../assets/artwork-7.png" alt=""></div>
  <div class="tile wide"><img src="../assets/artwork-3.png" alt=""></div>
  <div class="tile"><img src="../assets/artwork-5.png" alt=""></div>
</div>
</body>
</html>
