<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0ede6; padding: 16px; display: flex; gap: 10px; }
  .theme { flex: 1; border-radius: 8px; overflow: hidden; border: 1px solid rgba(0,0,0,.08); }
  .header { padding: 12px 14px; }
  .title { font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
  .body { padding: 10px 14px; font-size: 11px; line-height: 1.5; }
  .swatches { display: flex; gap: 4px; padding: 10px 14px; }
  .dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(0,0,0,.1); }
</style>
</head>
<body>

<!-- Neon Ember -->
<div class="theme" style="background:#FFFDF6;">
  <div class="header" style="background:#FFFDF6; border-bottom:3px solid #E96B00;">
    <div class="title" style="color:#1A0F1C;">Neon Ember</div>
  </div>
  <div class="body" style="color:#1A0F1C;">Warm cream. Orange fire. Violet shadow.</div>
  <div class="swatches">
    <div class="dot" style="background:#FFFDF6;"></div>
    <div class="dot" style="background:#E96B00;"></div>
    <div class="dot" style="background:#FFD34E;"></div>
    <div class="dot" style="background:#6E3FD6;"></div>
    <div class="dot" style="background:#1A0F1C;"></div>
  </div>
</div>

<!-- Garden Ink -->
<div class="theme" style="background:#F7FAF8;">
  <div class="header" style="background:#F7FAF8; border-bottom:3px solid #D8527D;">
    <div class="title" style="color:#0F2B2B;">Garden Ink</div>
  </div>
  <div class="body" style="color:#0F2B2B;">Paper white. Deep teal. Blossom pink.</div>
  <div class="swatches">
    <div class="dot" style="background:#F7FAF8;"></div>
    <div class="dot" style="background:#D8527D;"></div>
    <div class="dot" style="background:#F09B2E;"></div>
    <div class="dot" style="background:#6AA585;"></div>
    <div class="dot" style="background:#0F2B2B;"></div>
  </div>
</div>

<!-- Kinetic Primary -->
<div class="theme" style="background:#FBFEFF;">
  <div class="header" style="background:#FBFEFF; border-bottom:3px solid #FF3D2E;">
    <div class="title" style="color:#0A1633;">Kinetic Primary</div>
  </div>
  <div class="body" style="color:#0A1633;">Clean white. Signal red. Navy + lemon.</div>
  <div class="swatches">
    <div class="dot" style="background:#FBFEFF;"></div>
    <div class="dot" style="background:#FF3D2E;"></div>
    <div class="dot" style="background:#FFF066;"></div>
    <div class="dot" style="background:#13D672;"></div>
    <div class="dot" style="background:#0A1633;"></div>
  </div>
</div>

<!-- Acid Meadow -->
<div class="theme" style="background:#FCFFF8;">
  <div class="header" style="background:#FCFFF8; border-bottom:3px solid #FF6A1A;">
    <div class="title" style="color:#07111E;">Acid Meadow</div>
  </div>
  <div class="body" style="color:#07111E;">Pale green-white. Hazard orange. Chartreuse.</div>
  <div class="swatches">
    <div class="dot" style="background:#FCFFF8;"></div>
    <div class="dot" style="background:#FF6A1A;"></div>
    <div class="dot" style="background:#D8FF5D;"></div>
    <div class="dot" style="background:#9EEA2F;"></div>
    <div class="dot" style="background:#07111E;"></div>
  </div>
</div>

</body>
</html>
